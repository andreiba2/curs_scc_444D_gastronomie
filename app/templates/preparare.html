<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Preparare - Tortilla de Patatas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: #b57f00;
            font-size: 40px;
        }

        h2 {
            font-size: 28px;
        }

        .container {
            margin-top: 50px;
        }

        p {
            font-size: 20px;
            margin: 20px;
            line-height: 1.6;
            max-width: none;
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            margin-top: 30px;
        }

        .steps {
            text-align: left;
            font-size: 18px;
        }

        .steps li {
            margin: 10px 0;
        }

        .image img {
            width: 400px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            font-size: 20px;
            color: #333;
        }

        a:hover {
            color: #b57f00;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🍳 Preparare</h1>

    <h2>Modul de preparare</h2>

    <p>{{ preparare }}</p>

    <div class="content">
        <div class="steps">
            <ol>
                <li>Curăță și taie cartofii felii subțiri.</li>
                <li>Prăjește-i ușor în ulei de măsline.</li>
                <li>Bate ouăle și adaugă ceapa.</li>
                <li>Amestecă totul și gătește în tigaie pe ambele părți.</li>
            </ol>
        </div>

        <div class="image">
            <img src="{{ url_for('static', filename='images/preparare.jpg') }}" alt="Preparare">
        </div>
    </div>

    <a href="/">⬅ Înapoi</a>
</div>

</body>
</html>
